<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#fff7fa;
}

header{
background:linear-gradient(to right,#ffd9e5,#ffc4d7);
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
color:#ff2e74;
}

nav a{
margin:0 10px;
text-decoration:none;
color:#222;
font-weight:500;
}

nav a:hover{
color:#ff2e74;
}

.hero{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:space-between;
padding:60px 8%;
}

.hero-text{
flex:1;
}

.hero-text h1{
font-size:50px;
color:#222;
}

.hero-text h2{
color:#ff2e74;
}

.btn{
background:#ff2e74;
color:white;
padding:12px 25px;
border:none;
border-radius:25px;
text-decoration:none;
display:inline-block;
margin-top:15px;
}

.hero img{
width:350px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.products{
padding:50px 8%;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:10px;
height:200px;
object-fit:cover;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">🌸 FlowerShop</div>
<nav>
<a href="index.html">Home</a>
<a href="Pageone.html">Products</a>
<a href="pagetwo.html">About</a>
<a href="page3.html">Reviews</a>
<a href="page4.html">Contact</a>
</nav>
</header>

<section class="hero">
<div class="hero-text">
<h1>Fresh & Beautiful Flowers</h1>
<h2>For Every Special Moment 🌷</h2>
<p>We deliver fresh flowers with love and care.</p>
<a class="btn" href="PageOne.html">Shop Now</a>
</div>

<img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946" alt="flowers">
</section>

<section class="products">
<h2>🌸 Best Flowers</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1525310072745-f49212b5ac6d">
<h3>Rose Bouquet</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1468327768560-75b778cbb551">
<h3>Tulips</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
<h3>Daisy Flowers</h3>
</div>

</div>
</section>

<footer>
<p>© 2026 Flower Shop | All Rights Reserved</p>
</footer>

</body>
</html>
